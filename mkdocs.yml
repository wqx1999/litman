site_name: litman
site_description: Local-first, AI-augmented literature management CLI.
site_url: https://litman.readthedocs.io        # placeholder — update on first deploy
repo_url: https://github.com/wqx1999/litman
repo_name: wqx1999/litman
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: 0-readme.md
  - Philosophy: 1-philosophy.md
  - Architecture: 2-architecture.md
  - Concepts: 3-concepts.md
  - Commands: 4-commands.md
  - Tutorial: 5-tutorial.md
