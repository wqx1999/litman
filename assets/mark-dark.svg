    <path d="M32 21 C 24 9 10 9 5 17 C 1.5 23 3.5 40 8 47 C 15 42 26 44 32 52 Z" fill="#f0f0f2" transform="translate(-1 0)"/>
    <path d="M32 21 C 40 9 54 9 59 17 C 62.5 23 60.5 40 56 47 C 49 42 38 44 32 52 Z" fill="#0a84ff" transform="translate(2.5 -4) rotate(4 32 36)"/>
  </g>
</svg>
