<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
<!-- litman app icon. The mark on a tile, because a shortcut icon lands on a
     background nobody controls: a dark taskbar, a light desktop, a wallpaper.
     Geometry is byte-identical to mark.svg; only the tile is new.

     The tile is a superellipse (|x|^5 + |y|^5 = 1), not a rounded rect. An arc
     corner jumps from zero curvature to 1/r where it meets the straight edge,
     and the eye catches that seam at icon sizes. Fitted here as 8 cubics, max
     radial error 0.016 units.

     The tile path is written twice rather than <defs>/<use>: this file is
     rasterised by whatever renderer each platform brings, and not all of them
     resolve SVG2 href.

     The hairline keeps the light tile off a light desktop. At 16px it is a
     quarter of a pixel, so it costs nothing where nothing can be spared. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9e9ef"/>
    </linearGradient>
  </defs>
  <path d="M64 32 C64 46.927 64.438 55.277 59.858 59.858 C55.277 64.438 46.927 64 32 64 C17.073 64 8.723 64.438 4.142 59.858 C-0.438 55.277 0 46.927 0 32 C0 17.073 -0.438 8.723 4.142 4.142 C8.723 -0.438 17.073 0 32 0 C46.927 0 55.277 -0.438 59.858 4.142 C64.438 8.723 64 17.073 64 32 Z" fill="url(#tile)"/>
  <path d="M64 32 C64 46.927 64.438 55.277 59.858 59.858 C55.277 64.438 46.927 64 32 64 C17.073 64 8.723 64.438 4.142 59.858 C-0.438 55.277 0 46.927 0 32 C0 17.073 -0.438 8.723 4.142 4.142 C8.723 -0.438 17.073 0 32 0 C46.927 0 55.277 -0.438 59.858 4.142 C64.438 8.723 64 17.073 64 32 Z" fill="none" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
  <g transform="translate(32 34.5) scale(0.72) translate(-32 -32)">
    <path d="M32 21 C 24 9 10 9 5 17 C 1.5 23 3.5 40 8 47 C 15 42 26 44 32 52 Z" fill="#1c1c1e" transform="translate(-1 0)"/>
    <path d="M32 21 C 40 9 54 9 59 17 C 62.5 23 60.5 40 56 47 C 49 42 38 44 32 52 Z" fill="#007aff" transform="translate(2.5 -4) rotate(4 32 36)"/>
  </g>
</svg>
