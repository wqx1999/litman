id: B2-revisit
title: 重新回看一篇老论文
layer: curation
source: 列
fixtures: []                          # 库操作卡：#1 已在 seed 内，不递 PDF（防 re-add 陷阱）
needs_pty: false
invariants: [11]
routing_label: lit-reading
seed: seed-1paper-diffdock-read
precondition: |
  #1 是已读完的论文（read-date=2026-05-01，status=deep-read，由 seed 固定）。
intent: |
  "我今天又把 DiffDock 翻出来想了想。"
expected_end_state:
  - "yaml_ne: papers/<diffdock>/metadata.yaml :: last-revisited == null"  # lit revisit 打戳
  - "yaml_eq: papers/<diffdock>/metadata.yaml :: read-date == 2026-05-01"  # inv#11：revisit 不动 read-date
  - "ran: revisit"
  - "health: clean"
auto_fail:
  - 把 read-date 覆盖成今天（混淆 first-read 与 revisit）                # inv#11
  - 手编 metadata
notes: |
  全 DSL（auto-scored）。原卡两个问题导致它假困在 prose-blocked：

  1. seed-1paper-diffdock **从未给 #1 盖 read-date**（只 _add，status=inbox/未读），而
     precondition 声称"read-date 非空"——phantom 前置。且 revisit 语义上要求论文是读完过
     的，inbox 未读不适用。改用新 seed **seed-1paper-diffdock-read**（_modify 固定
     read-date=2026-05-01 + status=deep-read，确定性、非 `lit read` 的今天日期）。

  2. "read-date 不变" 原是跨态比较转录为 prose。有了固定 read-date，promote 成
     `yaml_eq: read-date == 2026-05-01`：revisit 只盖 last-revisited 不动 read-date → 仍是
     2026-05-01；agent 误用 `lit read` 覆盖成今天（auto_fail）→ ≠ 2026-05-01 → 判挂，忠实。

  失败根因还含 skill 路由：口语 "又把 X 翻出来想了想" 没触发 lit-reading，agent 泛泛反问
  （零 lit 调用）。`419e083` 给 lit-reading description 加 revisit 触发 + body @302 改"用户
  明说重看 → inline 盖 `lit revisit` 戳，never *infer*"。

