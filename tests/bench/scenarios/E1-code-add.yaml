id: E1-code-add
title: clone 论文的代码仓库并绑定
layer: linking
source: 列+补
fixtures: [4]
needs_pty: false
needs_network: true                   # git clone
invariants: [12]
routing_label: lit-library
seed: seed-2papers-peptide
skip_reason: "needs_network — 本卡确实要 git clone，但**“沙箱无网”这个旧理由是错的**：2026-07-16 于计算节点 node460 实测 github.com HTTP 200、`git clone --depth 1` 成功、api.anthropic.com 可达（404 = 打得通根路径）。真实的跳过原因是**范围**：本轮只做尺子对账，解封 needs_network 卡是下一批的事（解封时要一起想清楚的：clone 真实 repo 引入网络抖动/上游改名带来的非确定性，跑分要不要钉 commit）。"
