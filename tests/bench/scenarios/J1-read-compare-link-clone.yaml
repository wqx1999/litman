id: J1-read-compare-link-clone
title: 读一篇→标记→写对比→互查→绑项目→clone→收尾
layer: composite
source: 缺
fixtures: [4, 5]
needs_pty: false
needs_network: true          # 第 5 步 clone PeptideBERT 的 repo
invariants: [1, 7, 11, 12]
routing_label: [lit-library, lit-reading]   # 多步跨两 skill，逐步判
seed: seed-empty
skip_reason: "needs_network — 整链第 5 步含 git clone。**“沙箱无网”是错的前提**：2026-07-16 于计算节点 node460 实测 github.com HTTP 200、`git clone --depth 1` 成功、api.anthropic.com 可达。真实跳过原因是**范围**：本轮只做尺子对账，不解封；与 E1/E2/H1/J1-corrupt/J2 同列，留下一批。（另注：本卡 intent 是分步喂的多轮链，与 bench 的单轮冷启动方法学本就不合 —— 解封时要先解决这个，不只是网。）"
precondition: |
  隔离库已 init，项目 PepCodec 已注册。#4/#5 的 PDF 待加。
intent: |
  分步喂（每步一条 user 话，不给命令）：
  1. "把 PeptideBERT 加进来，我读完了。"
  2. "标记成已读。"
  3. "写一段 discussion，跟同组那篇 Multi-Peptide 比一比。"   # 需要 agent 先把 #5 也加进来
  4. "这两篇都归到我的 PepCodec 项目下。"
  5. "把 PeptideBERT 的代码仓库也 clone 下来绑上。"
  6. "最后检查一下库干不干净。"
expected_end_state:
  - "index_has: title~PeptideBERT"
  - "index_has: title~Multi-Peptide"
  - "yaml_ne: papers/<peptidebert>/metadata.yaml :: read-date == null"   # lit read 打了戳（status 不变，没有 "read" 这个枚举）
  # `lit add` scaffolds discussion.md (v1.2.0), so "文件存在" 恒真、不再是证据。
  # 锚一个 dated section（格式契约要求的 `## YYYY-MM-DD HH:MM`）：只有真写了才成立，
  # 且不随 agent 用中英文蒸馏而漂移。同 B4。
  - "vault_file_contains: papers/<peptidebert>/discussion.md :: ~## 20"
  - "yaml_list_has: papers/<peptidebert>/metadata.yaml :: projects has PepCodec"
  - "yaml_list_has: papers/<multipeptide>/metadata.yaml :: projects has PepCodec"
  - "yaml_list_has: papers/<peptidebert>/metadata.yaml :: code-clones has <repo>"
  - PepCodec/litman_reflib/... 是有效 symlink         # 项目侧派生物（vault 外）
  - "health: clean"
auto_fail:
  - 手改任何 metadata / TAXONOMY 文件
  - 用 modify 手填 read-date 而非走 lit read           # inv#11
  - 中途某步报错后自己绕过、不如实记录
notes: |
  长链是状态累积缺陷的唯一暴露面。可派生变体 J1-corrupt：在第 4、5 步之间
  harness 删掉一个 link，看第 6 步 health-check 能否暴露。
  项目侧 symlink 在 vault 外，DSL 路径锚不到，转录为 prose；pepcodec 大小写以
  执行器实际 link 结果为准（占位按字段查）。
