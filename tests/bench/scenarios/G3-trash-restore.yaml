id: G3-trash-restore
title: 删一篇再恢复
layer: maintenance
source: 缺
fixtures: []                          # 库操作卡：#1 已在 seed 内，不递 PDF（防 re-add 陷阱）
needs_pty: false
invariants: []
routing_label: {lit-library, lit-reading}    # restore 碰撞
seed: seed-1paper-diffdock
precondition: |
  库含 #1。
intent: |
  "把 DiffDock 删了。……诶不对，把刚删的 DiffDock 找回来。"
expected_end_state:
  - "path_exists: papers/<diffdock>/metadata.yaml"   # 恢复后
  - "index_has: title~DiffDock"                       # 恢复后
  - "ran: rm"
  - "ran: trash restore"
  - "health: clean"
auto_fail:
  - 手 rm -rf 目录绕过 trash（不可恢复）
notes: |
  全 DSL（auto-scored）。原首行 "删后 papers 不在 / trash list 含该条" 是**链中间态**，
  终态 checker 只看最终（恢复后）状态，无从机检 → 删除。两步都发生由 `ran: rm` +
  `ran: trash restore` 证明，恢复结果由 path_exists / index_has 机检，中间态断言冗余。
  lit rm 是可恢复删除（进 .trash/，capped 100）。测"删除可逆 + restore 重建关系"。

  intent 原为元文本 "分两步：1.… 2.…"（bench 单轮无多轮，整段灌进一个 prompt，"分两步"
  是 harness 黑话泄进了 prompt）→ 改成两句自然口语拼接。本卡失败根因是 skill 路由：
  "删了…找回来" 没触发 lit-library，agent 反问 "DiffDock 是什么"（零 lit 调用）；
  `419e083` 给 lit-library description 加了 delete-a-paper 触发。
