id: G2-rename-ripple
title: 改 paper id，看引用是否全跟着更新
layer: maintenance
source: 缺
fixtures: []                          # 库操作卡：#4/#5 已在 seed 内，不递 PDF（防 re-add 陷阱）
needs_pty: false
invariants: [14]
routing_label: lit-library
seed: seed-2papers-peptide
precondition: |
  #4、#5 已入库；#4 的 related 含 #5（seed `_relate(4,5)` 已注入，rename 涟漪的反向
  related 边可机检）。wikilink / 项目 symlink 涟漪不在本卡范围（seed 未建，见 notes）。
intent: |
  "把 PeptideBERT 的 id 改成 2023_Guntuboina_PeptideBERT-v2。"
expected_end_state:
  - "path_exists: papers/2023_Guntuboina_PeptideBERT-v2"
  - "path_absent: papers/2023_Guntuboina_PeptideBERT-Language"
  - "yaml_list_has: papers/<multi-peptide>/metadata.yaml :: related has 2023_Guntuboina_PeptideBERT-v2"
  - "ran: rename"
  - "health: clean"
auto_fail:
  - 改目录名但反向引用（related / wikilink / symlink）悬空 → 没走 lit rename 原子涟漪
  - 手 mv 目录
notes: |
  全 DSL（auto-scored）。原先三处问题导致它假困在 prose-blocked 且永不可过：

  1. `path_absent: <old-peptidebert-id>` —— placeholder 按 title "PeptideBERT" 解析，
     改名只动 id 不动 title，故改名后它**重新解析到新 id** `...-v2`，去查新路径"不存在"
     → 必挂（agent 改对了也判 0，cc_haiku_260604_0 r0 即此）。改为 literal 旧 id
     `2023_Guntuboina_PeptideBERT-Language`（`derive_id` 实跑确认），改名后它确实消失。

  2. "#5 的 related 指向新 id" —— #4↔#5 的 related 边由 seed `_relate(4, 5)` 真注入，
     `lit rename` 原子更新反向边，故 promote 成 `yaml_list_has ... related has <新id>`
     机检：agent 没更新 / 手 mv 致悬空都判挂，忠实。

  3. "#5 notes.md wikilink"、"PepCodec litman_reflib symlink" 两条 —— seed-2papers
     **从未注入** wikilink / 项目 link（原 notes 自承 deferred 到"Phase E"，但该注入
     never built），即在断言**不存在的状态** → 必然 manual-fail。已删除（不静默丢：
     wikilink / 项目-link rename 涟漪的覆盖留待未来给 seed 加 `_notes` wikilink +
     `_project`/`_link` 后，另起卡或在此补回）。health: clean 仍兜底"无悬空引用"。
