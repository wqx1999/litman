id: C2-show
title: 看某一篇的详情
layer: retrieval
source: 补
fixtures: []                          # 库操作卡：#4 已在 seed 内，不递 PDF（防 re-add 陷阱）
needs_pty: false
invariants: [10]
routing_label: {lit-library, lit-reading}
seed: seed-2papers-peptide
precondition: |
  库含 #4。
intent: |
  "PeptideBERT 那篇的作者和年份是什么？"
expected_end_state:
  - "ran: show"                        # lit show <id> [--format json]
  - "answer_contains: ~2023"           # 答出 year=2023
  - "answer_contains: ~Guntuboina"     # 答出第一作者 Guntuboina
auto_fail:
  - 凭记忆答而没查库
adherence_flags:
  - cat papers/<id>/metadata.yaml 直接读文件而非 lit show（单篇读可容忍，但 show 是正路）
notes: |
  "答出 year/作者" 是执行器对话答案，不落磁盘，由 answer_contains 对 run.final_text
  机检（执行阶段 run 注入），不静默通过。
