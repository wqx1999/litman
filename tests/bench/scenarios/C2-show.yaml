id: C2-show
title: 看某一篇的详情
layer: retrieval
source: 补
fixtures: []                          # 库操作卡：#4 已在 seed 内，不递 PDF（防 re-add 陷阱）
needs_pty: false
invariants: [10]
routing_label: {lit-library, lit-reading}
seed: seed-2papers-peptide-revisited
precondition: |
  库含 #4。#4 已读完（read-date=2026-05-01, status=deep-read），上次回看 = 2026-06-15
  （三个值都由 seed 钉死，不随跑的日期漂）。
intent: |
  "我库里 PeptideBERT 那篇，上次回看的日期库里是记着的，帮我查出来。"
expected_end_state:
  # 两条不冗余：`ran: show` 证明**选对了工具**；`stdout_contains` 证明**那个值真的到了
  # agent 手里**，而不是它编的（对 #5 跑 show 拿不到 2026-06-15）。
  # ⚠️ 精确边界（实测，别把它读强了）：`stdout_contains` 先 grep lit 调用的 stdout，
  # 找不到时**回退去 grep 该轮所有 tool_result**（`executor.stdout_blob`，不限于 lit）——
  # 所以 agent 直接 `cat` metadata.yaml 也能让这条为真（2026-07-17 r2 实测如此）。
  # 挡住那种情况的是 `ran: show`，不是这条。
  # ⇒ 合起来只证明「跑了 show」且「值到过 agent 手里」，**并不严格证明值出自那次 show**：
  #   一个对 #5 跑 show、又 cat 了 #4 的 agent 两条都能过（做作，但不是不可能）。
  #   两条缺一不可，但也就到这个强度为止，别在别处引用成更强的结论。
  - "ran: show"                        # last-revisited 跨所有出口只有 show 拿得到
  - "stdout_contains: ~2026-06-15"     # 读的是工具输出、**永不碰 final_text** ⇒ 措辞无关
  # 纯读卡的守卫，先例 = B2-revisit 的 `read-date unchanged`。agent 盖个 revisit 戳，
  # last-revisited 就变成今天，上面两条随之落空——而那种失败只会报"没查到"，看不出是
  # "自己把它改了"。这条让失败自报原因。便宜，且理由不依赖任何触发词分析。
  # ⚠️ 2026-07-17 订正：本注释原写"intent 里的'回看'正是 lit revisit 的触发词"——**是假的**。
  # `grep -r 回看 src/litman/` = **0 命中**。`lit revisit` 的真实触发词见
  # lit-reading/SKILL.md:3/146/306：「又把 X 翻出来想了想」「重新看了下 X」「re-opened X」
  # 「looking at X again」。"回看"只是语义邻近，不是文档化触发词——而实测正好相反：
  # haiku 把它读成了「浏览历史」（见 notes ⑤）。**这条假声明在 `6682bf1` 里就存在，
  # 我这轮还一度把它回滚了回来 —— 正是本 spec 要治的病（对产品的断言，没回头 grep 产品）。**
  - "yaml_eq: papers/<peptidebert>/metadata.yaml :: last-revisited == 2026-06-15"
auto_fail:
  - 凭记忆答而没查库
adherence_flags:
  - cat papers/<id>/metadata.yaml 直接读文件而非 lit show（单篇读可容忍，但 show 是正路）
notes: |
  **本卡证明的是「取到了」，不是「答对了」——刻意如此，且是本层的既有契约。**
  `stdout_contains` grep 的是 agent 那次 lit 调用的 stdout（CLI 自己的输出），不看
  `final_text`。所以一个 agent 取到了 2026-06-15 却在措辞里把日期报错，仍判 1。
  **这个缺口不补**：C1-list-filter 与 C3-search-notes 同样用 stdout_contains 证明检索、
  同样不查措辞 —— 本卡原来那条 `answer_contains` 才是全库唯一的例外，现在是回归房规。
  也**别**加一条弱化版 `answer_contains: ~2026` 来打补丁：同一份 metadata 里
  `read-date` = 2026-05-01 也是个 2026，那条会放过"把 read-date 当成回看日期报出来"的
  agent —— 比诚实地留着这个缺口更糟。

  **为什么锚 last-revisited。** 这张卡量的能力点是「只有 lit show 拿得到的详情」，所以它
  必须问一个**投影外**的字段，否则退化成和 C1 重叠的检索卡。show 的输出是整份
  metadata.yaml（`--format json` 的 help 原文："the FULL metadata dict (every field,
  not the INDEX projection)"），而 `lit list --format json` 复用 INDEX 的 14 字段薄投影。
  `last-revisited` 是**唯一**跨所有出口都只有 show 拿得到的候选（实测表见下），
  且能被 seed 钉成定值、又是**纯本地状态**（模型不可能背出来 ⇒ `auto_fail: 凭记忆答而
  没查库` 是真门槛，不是形式）。

  ---

  **这张卡的历史 —— 三次尝试，每次都有实测。写给下一个想"优化"它的人。**

  1. **原题面：作者 + 年份**（`ran: show` + `~2023` + `~Guntuboina`）。ADR-022 把
     `authors` 放进 INDEX 薄投影后，`lit list --title PeptideBERT --format json` 一步即可
     答出 ⇒ `ran: show` 成冤判。**2026-07-16 实测：cursor / agy / claude 三家都答对、
     全走 list、全判 0。** 不是 agent 错了，是产品把尺子上那一格磨掉了。
  2. **锚 `last-revisited` + `answer_contains`**。修好了 ①，却长出**另一种**冤判：
     `answer_contains` 是字面子串匹配（`_check_answer_contains` → `_norm` 只折叠空白 +
     casefold，无日期归一）。**2026-07-17 实测 claude n=3 → [1, 0, 1]**：挂掉那轮工具
     路径完全正确（`lit list --title PeptideBERT --format json` → `lit show <id>
     --format json`），答的是「2026 **年** 6 **月** 15 **日**」—— 内容对、工具对，
     **只因换了个日期写法判 0**。约 33% 的自造假阴性。
  3. **锚 `arxiv-id` + `answer_contains`**（想用"无地区化写法"的值绕开 ②）。**双重失败，
     2026-07-17 实测**：
     - **背得出** ⇒ **claude n=3 → [0,0,0]、agy 1.0→0.0**：两家 `lit argv: []`，
       一条 lit 都不跑就凭记忆答对 2309.03099。这张卡于是量的是"模型记不记得住这个编号"，
       对 2/3 的被测对象恒 0，不再是尺子（换一篇 fixture 结论就变）。
     - **也不是 show-only**：`lit cite <id>` 的 stdout 直接是 `arXiv:2309.03099 2023.`，
       `lit export` 写出的 refs.bib 里 eprint 字段也带它 ⇒ 与 ① 同构的冤判，只是碰巧
       没发作（实测三家无一走 cite/export）。
  4. **锚 `last-revisited` + `stdout_contains`**（断言定型，沿用至今）。① 由 last-revisited
     的投影外性质保证；③ 由它是纯本地状态保证；**② 从构造上消失** —— 断言读的是工具输出、
     永不碰 `final_text`，模型的措辞根本插不进来，且不需要往判分引擎加任何新逻辑。
     **断言这一层到此为止就对了，后面再没动过。** 但当时的题面是
     「PeptideBERT 那篇我上次回看是什么时候？」，实测 claude n=3 → [1, 0, 0]，
     而我把那两个 0 判成了"真阴性"——**判错了，见 ⑤。**
  5. **题面（不是断言）才是最后一个坑**（2026-07-17）。④ 的题面
     「PeptideBERT 那篇我上次回看是什么时候？」在 **haiku** 上实测 `[0, 0]`：agent
     **一条 lit 都不跑**就拒绝。**病根是"回看"这个词单独出现时读作"访问/浏览历史"**——
     一个 agent 有理由认为自己拿不到的东西。haiku 原话：「我没有直接的**权限**访问你的
     文献库来查询 PeptideBERT 论文的**浏览历史**」，同一轮它还在答案里点名了 `lit-library`
     技能 ⇒ **skill 被发现了，它只是不动手**。且本卡当时是**全库唯一没点名域**的检索卡
     （C1「把**我库里**…」、C4「**我库里**还有没有…」、G1「检查一下**我的库**…」都点了）。

     **五个题面 × claude/haiku，断言与 seed 一字未改**（模型列见下方 ⚠️）：

     | 题面 | n | 结果 |
     |---|---|---|
     | 「PeptideBERT 那篇我上次回看是什么时候？」（④ 的） | 2 | `[0, 0]` |
     | 「**我库里** PeptideBERT 那篇，上次回看是什么时候？」 | 3 | `[0, 1, 0]` |
     | 「我库里…上次**回看的日期记录**是什么？」 | 3+3 | `[0, 1, 1]` 然后 `[0, 0, 0]` ⚠️ **两次抽样，见下** |
     | 「我库里 PeptideBERT 那篇，**详细信息**给我看看。」 | 3 | `[1, 1, 1]` ❌ **否决：破 ③** |
     | 「我库里…**完整记录调出来看看**——我想知道上次回看是哪天。」 | 3 | `[1, 1, 1]` ❌ **否决：破 ④** |
     | 「我库里…上次回看是哪天？**库里存着这个日期**，帮我查出来。」 | 3 | `[1, 1, 1]` ✅ 合格，落选（文风） |
     | **「我库里 PeptideBERT 那篇，上次回看的日期库里是记着的，帮我查出来。」（现行）** | 3 | **`[1, 1, 1]`** |

     **⚠️ 四行 3/3 里只有两行能要，最后一行才是选中的 —— 这是本条最重要的部分。
     分数在这张表里没有区分力：合格与否全由构造决定。**
     「详细信息给我看看」也是 3/3，但它**从题面这一侧复活了 ①**：`lit list --title X
     --format json` 吐的 14 字段投影**就是**一份合理的"详细信息"，走这条路的 agent
     **答得合格却两条断言全挂** = 假阴性，正是 ADR-022 那次三家全对全判 0 的同一个病。
     **它同时违反 wangq 2026-07-16 签字的决策 1「C2 改题面，问投影外字段」。**
     现行题面保住了那条：它**仍然问 `last-revisited`**，所以 list 路径给的是**错答案**，
     判 0 是真阴性。**这不是论证，是实测**——候选「…上次回看的日期记录是什么？」的 r1：
     ```
     lit 调用 = [list]   → 答「上次回看日期是 2026-05-01」（那是 read-date！真值 2026-06-15）
     ```
     同一条 list 路径，**题面问投影外字段 ⇒ 它答错、判 0 正确；题面问"详细信息" ⇒ 它答对、
     判 0 冤枉**。题面决定的不是难度，是**判 0 的正当性**。
     （这个 agent 正是本卡 notes 早就预言过的那个「把 read-date 当成回看日期报出来」的 agent。）

     **「回看的日期记录」那版为什么也不能要（它满足 ①③，只差 ②）。** 它跑了两次，
     `[0,1,1]` 和 `[0,0,0]` —— **均值分不开，逐轮原话分得开**：
     ```
     r0  lit=[]      「我查了一下内存系统…你的内存索引还没有建立」        ← 拒绝，病还在
     r1  lit=[list]  「上次回看日期是 2026-05-01」                        ← read-date！答错，真阴性
     r2  lit=[]      「我无法直接访问你的本地文献库」                      ← 拒绝，病还在
     ```
     6 轮里至少 2 轮是**同一个拒绝形状** ⇒ 「回看」单独挂在句尾时仍被读成访问历史，
     ② 没修好。**这是把它排除掉的构造理由，不是它分数低。**

     **④ 号约束：题面不许撞 skill 给 `show` 的说法**（wangq 2026-07-17 拍板「按严格的来」；
     reviewer 提出）。「完整记录」≈ `lit-reading/SKILL.md:161` 的 "`lit show <id> --format
     json` to load its **full record**"（另有 :39/:125/:129/:135 的 "full field set" /
     "full metadata dict"）。撞上之后，agent 可以**不从投影边界推理**（本卡声称量的能力），
     只靠**关键词匹配"完整记录"→"full record"→show** 就得分 —— 两条路径分数相同，
     `[1,1,1]` **分不开它们**。这不是假阴性，决策 1 的字面也满足；坏的是决策 1 的**理由**
     （"保住这张卡测的能力点"）。
     **与 C1 的「列出来」→`list` 不同构**：C1 送掉的是动词、量的是过滤器
     （`stdout_not_contains: ~DiffDock` 钉着）——**送掉的不是被量的那部分**；本卡被量的
     **就是**工具选择，送不得。
     （**订正一句 reviewer 的措辞**：「完整记录」这四个字在 SKILL.md 里是 **0 命中**，
     撞的是**语义/翻译**不是字面串。但严格口径下语义撞车同样出局。）

     **现行题面因此一个工具形状的词都不含**，改用「库里是记着的」直接断言数据存在 ——
     这正面打掉 ② 的那个误解（"访问历史我拿不到"），且不提示任何命令。
     **它没有多送信息**：skill 自己就写着「INDEX 投影只有 …/read-date/updated-at，
     超出投影的用 `lit show --format json`」（SKILL.md:125），`last-revisited` 恰在投影外 ⇒
     **"该用 show" 仍需 agent 自己从投影边界推出来**，这就是本卡要量的那一步。

     **⚠️ 用词雷区（改题面前必查，我踩过）**：「翻出来」**是 `lit revisit` 的真触发词**
     （SKILL.md:146/306「又把 X 翻出来想了想」）⇒ 用它会让 agent 盖戳、`yaml_eq` 守卫开火。
     `grep -rn '<新词>' src/litman/skills/` 是必做动作，别靠语感。

     **五个落选者各差一条**：④ 的题面 ①② 全差；「我库里…上次回看是什么时候」差 ②；
     「回看的日期记录」差 ②（上方实测）；「详细信息给我看看」差 ③（并复活假阴性）；
     「上次回看是哪天？库里存着这个日期」**①②③④ 全过、纯粹落选于文风**（两句、两个"库"，
     现行是单句）—— **这一个落选与测量无关，别把它读成"它更差"。**
     **三家复验（现行题面）**：claude/haiku `[1,1,1]`、cursor `[1]`、agy `[1,1]`。

  **⚠️ ④ 的"两个 0 都是真阴性"——部分收回，且注意模型不同。**
  ④ 的 `[1,0,0]` 测于 **sonnet-4.6**；⑤ 的题面扫描全部测于 **haiku**。两者不可直接相减。
  - **r2 仍然是真阴性，成立**：它 `cat` 了 metadata.yaml 然后答对 —— 绕开 litman =
    本卡 `adherence_flags` 早就点名的 ADR-007 违规；那轮 `stdout_contains` 因为回退 blob
    命中了 cat 的输出而为真（见 assertions 上方的边界说明），**只有 `ran: show` 判了它挂**
    —— 这仍是"两条断言缺一不可"的活证据。
  - **r1（"没查就说库是空的"）的归因收回**：haiku 在同一题面下 100% 复现了同形状的拒绝，
    换题面后归零 ⇒ 题面**至少是**共同成因。**但 r1 是 sonnet、原话也不同**
    （「你的记忆库目前是空的」vs haiku 的「没有权限…浏览历史」），**sonnet 这条腿未复验**，
    所以只说"归因不成立"，不说"已证明是题面所致"。要定论就重跑 sonnet。

  **教训（比这张卡更值钱）：断言对了，卡仍可以是坏的。** ①②③ 三轮我都在改**锚点和判分**，
  ⑤ 证明第四个坑在**题面**——它不产生假阴性（agent 确实没跑 show，判 0 是"对"的），
  而是**换掉了被测的能力**：量的成了"agent 猜不猜得到有个库/这个字段查不查得了"，
  不是"会不会用 lit show"。这种坏法在分数上看不出来。**更坏的是"详细信息"那一版：
  它分数最好看，却是四个候选里唯一重新引入假阴性的。**
  ⇒ **改题面必须逐轮读 final_text + lit 调用序列，并问"走别的工具答对的 agent 会不会被判 0"，
  别只看均值。分数高不是通过条件。**

  **三个锚 vs 三条约束（① 投影外 / ② 无第二种写法 / ③ 记不住）：**

  | 锚 | ① | ② | ③ | 实测（2026-07-16/17） |
  |---|---|---|---|---|
  | authors + year | ❌ ADR-022 后 list 可答 | ✅ | ✅ | 三家全对、全判 0（全是假阴性） |
  | arxiv-id | ❌ cite/export 漏 | ✅ | ❌ 背得出 | claude [0,0,0]、cursor [1]、agy [0] |
  | last-revisited + answer_contains | ✅ | ❌ 措辞可漂 | ✅ | claude [1,0,1]、cursor [1]、agy [1]（那个 0 是假阴性） |
  | **last-revisited + stdout_contains** | ✅ | ✅ 断言不碰措辞 | ✅ | **现行（断言层自 ④ 未再动）。分数取决于题面，见 ⑤。** |

  **这张表只管锚点，管不到题面 —— 而题面能独自把卡废掉。** 三条约束全绿之后本卡仍测出
  `[0,0]`（⑤）。**且题面还能反向破掉 ①**：即便锚点/断言原封不动，一个不问投影外字段的
  题面（「详细信息给我看看」）会让 `lit list` 变成合格答法 ⇒ `ran: show` 重新沦为冤判。
  **所以 ① 不是"锚点选对就一劳永逸"的属性，它同时挂在题面上。** 详见 ⑤。

  **⚠️ 跨行的分数不可直接相减** —— 每一行是一次独立抽样、模型未必相同（④ = sonnet-4.6，
  ⑤ 的题面扫描 = haiku），且 claude 每轮要不要查库本身就在漂（④ 时期同一设计两次抽样：
  一次 3/3 用了 lit，一次只有 1/3）。n=3 分辨不开相近的设计。
  **这些数字用来抓"坏成 0"，不用来做精细排序，更不用来在两个 3/3 之间选人 —— 那次得靠构造。**

  **实测出口表（2026-07-17，seed 内 #4）—— 这张表是本卡成立的地基。**
  它已用真 CLI 钉进 `test_seeds.py`：产品哪天长出新出口（就像 ADR-022 那次），
  会红在 /dev，而不是烂在这张卡里等着冤判下一个 agent。

  | 出口 | 含 2026-06-15？ | 含 2309.03099？ |
  |---|---|---|
  | `lit show`（json / table） | ✅ 本卡正路 | ✅ |
  | `lit list` / `--title` / `lit search` / `lit related` | ❌ | ❌ |
  | `lit cite <id>` | ❌ | ⚠️ 是 |
  | `lit export` → refs.bib | ❌ | ⚠️ 是 |

  **留给后人的开放项：`_check_answer_contains` 的日期归一仍未做。** 本卡已不再用
  `answer_contains`，全库暂无其他卡在措辞里断言日期，所以没人被逼着修；但**下一张这么做
  的卡会原地踩中 ②**。方向是在 verb 里归一（或支持 any-of 多字面量），不是放宽成关键词
  匹配 —— 那是往判分引擎加逻辑，风险自负。已上报 wangq。

  **裸跑 `lit show`（无参数）在本 seed 下落在 #4 上，且是构造上确定的**（2026-07-17 实测，
  三条路径都指向 #4）：无参 show 取 `most_recent_paper_id` → `recency_key`，按
  `updated-at` 排、并列时 id 升序破平。
  - 本 seed 最后一步 `_modify(4, ...)` **严格最后**执行 ⇒ #4 的 `updated-at` 实测领先
    #5 整整 1.000s（`…:29` vs `…:28`），不是并列；
  - 即便某次构建挤进同一秒撞成并列，升序破平也仍选 #4（`2023_Guntuboina…` <
    `2024_Badrinarayanan…`）—— 后备路径同向；
  - `pdf mtime` 不参与竞争：`copy2` 保留 fixture 的 mtime，实测 #5 的 pdf 反而更新
    （`…150` > `…149`），而 most_recent 仍取 #4 ⇒ 证明排序键就是 `updated-at`。

  **但本卡不依赖它、也不为它特判**（这两件事不矛盾：确定 ≠ 该被依赖）。它只是意味着
  "漏传 id 的 agent 恰好也能过"不会随机翻脸。改 seed 步骤顺序仍可能翻转它 —— 翻转后
  agent 会 show 到 #5、stdout 里没有 2026-06-15、被正确判挂，那也是对的。

  **推论：haiku 0.97 基线测于 ADR-022 之前，跨该日期这张卡的分数不可直接比。**
  旧分数是旧尺子量的，本卡只保证今后可比。
