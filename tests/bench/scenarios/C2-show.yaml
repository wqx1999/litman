id: C2-show
title: 看某一篇的详情
layer: retrieval
source: 补
fixtures: []                          # 库操作卡：#4 已在 seed 内，不递 PDF（防 re-add 陷阱）
needs_pty: false
invariants: [10]
routing_label: {lit-library, lit-reading}
seed: seed-2papers-peptide-revisited
precondition: |
  库含 #4。#4 已读完（read-date=2026-05-01, status=deep-read），上次回看 = 2026-06-15
  （三个值都由 seed 钉死，不随跑的日期漂）。
intent: |
  "PeptideBERT 那篇我上次回看是什么时候？"
expected_end_state:
  # 两条不冗余：`ran: show` 证明**选对了工具**；`stdout_contains` 证明**那个值真的到了
  # agent 手里**，而不是它编的（对 #5 跑 show 拿不到 2026-06-15）。
  # ⚠️ 精确边界（实测，别把它读强了）：`stdout_contains` 先 grep lit 调用的 stdout，
  # 找不到时**回退去 grep 该轮所有 tool_result**（`executor.stdout_blob`，不限于 lit）——
  # 所以 agent 直接 `cat` metadata.yaml 也能让这条为真（2026-07-17 r2 实测如此）。
  # 挡住那种情况的是 `ran: show`，不是这条。
  # ⇒ 合起来只证明「跑了 show」且「值到过 agent 手里」，**并不严格证明值出自那次 show**：
  #   一个对 #5 跑 show、又 cat 了 #4 的 agent 两条都能过（做作，但不是不可能）。
  #   两条缺一不可，但也就到这个强度为止，别在别处引用成更强的结论。
  - "ran: show"                        # last-revisited 跨所有出口只有 show 拿得到
  - "stdout_contains: ~2026-06-15"     # 读的是工具输出、**永不碰 final_text** ⇒ 措辞无关
  # 纯读卡的守卫（先例：B2-revisit 的 "read-date unchanged"）。intent 里的"回看"正是
  # lit-reading 中 `lit revisit` 的触发词；agent 顺手盖个戳，last-revisited 就变成今天，
  # 断言随之落空——而那种失败只会报"没查到"，看不出是"自己把它改了"。这条让失败自报原因。
  - "yaml_eq: papers/<peptidebert>/metadata.yaml :: last-revisited == 2026-06-15"
auto_fail:
  - 凭记忆答而没查库
adherence_flags:
  - cat papers/<id>/metadata.yaml 直接读文件而非 lit show（单篇读可容忍，但 show 是正路）
notes: |
  **本卡证明的是「取到了」，不是「答对了」——刻意如此，且是本层的既有契约。**
  `stdout_contains` grep 的是 agent 那次 lit 调用的 stdout（CLI 自己的输出），不看
  `final_text`。所以一个 agent 取到了 2026-06-15 却在措辞里把日期报错，仍判 1。
  **这个缺口不补**：C1-list-filter 与 C3-search-notes 同样用 stdout_contains 证明检索、
  同样不查措辞 —— 本卡原来那条 `answer_contains` 才是全库唯一的例外，现在是回归房规。
  也**别**加一条弱化版 `answer_contains: ~2026` 来打补丁：同一份 metadata 里
  `read-date` = 2026-05-01 也是个 2026，那条会放过"把 read-date 当成回看日期报出来"的
  agent —— 比诚实地留着这个缺口更糟。

  **为什么锚 last-revisited。** 这张卡量的能力点是「只有 lit show 拿得到的详情」，所以它
  必须问一个**投影外**的字段，否则退化成和 C1 重叠的检索卡。show 的输出是整份
  metadata.yaml（`--format json` 的 help 原文："the FULL metadata dict (every field,
  not the INDEX projection)"），而 `lit list --format json` 复用 INDEX 的 14 字段薄投影。
  `last-revisited` 是**唯一**跨所有出口都只有 show 拿得到的候选（实测表见下），
  且能被 seed 钉成定值、又是**纯本地状态**（模型不可能背出来 ⇒ `auto_fail: 凭记忆答而
  没查库` 是真门槛，不是形式）。

  ---

  **这张卡的历史 —— 三次尝试，每次都有实测。写给下一个想"优化"它的人。**

  1. **原题面：作者 + 年份**（`ran: show` + `~2023` + `~Guntuboina`）。ADR-022 把
     `authors` 放进 INDEX 薄投影后，`lit list --title PeptideBERT --format json` 一步即可
     答出 ⇒ `ran: show` 成冤判。**2026-07-16 实测：cursor / agy / claude 三家都答对、
     全走 list、全判 0。** 不是 agent 错了，是产品把尺子上那一格磨掉了。
  2. **锚 `last-revisited` + `answer_contains`**。修好了 ①，却长出**另一种**冤判：
     `answer_contains` 是字面子串匹配（`_check_answer_contains` → `_norm` 只折叠空白 +
     casefold，无日期归一）。**2026-07-17 实测 claude n=3 → [1, 0, 1]**：挂掉那轮工具
     路径完全正确（`lit list --title PeptideBERT --format json` → `lit show <id>
     --format json`），答的是「2026 **年** 6 **月** 15 **日**」—— 内容对、工具对，
     **只因换了个日期写法判 0**。约 33% 的自造假阴性。
  3. **锚 `arxiv-id` + `answer_contains`**（想用"无地区化写法"的值绕开 ②）。**双重失败，
     2026-07-17 实测**：
     - **背得出** ⇒ **claude n=3 → [0,0,0]、agy 1.0→0.0**：两家 `lit argv: []`，
       一条 lit 都不跑就凭记忆答对 2309.03099。这张卡于是量的是"模型记不记得住这个编号"，
       对 2/3 的被测对象恒 0，不再是尺子（换一篇 fixture 结论就变）。
     - **也不是 show-only**：`lit cite <id>` 的 stdout 直接是 `arXiv:2309.03099 2023.`，
       `lit export` 写出的 refs.bib 里 eprint 字段也带它 ⇒ 与 ① 同构的冤判，只是碰巧
       没发作（实测三家无一走 cite/export）。
  4. **现在：锚 `last-revisited` + `stdout_contains`**。① 由 last-revisited 的投影外性质
     保证；③ 由它是纯本地状态保证；**② 从构造上消失** —— 断言读的是工具输出、永不碰
     `final_text`，模型的措辞根本插不进来，且不需要往判分引擎加任何新逻辑。
     **2026-07-17 实测：claude n=3 → [1, 0, 0]、cursor 1 轮 → 1、agy 1 轮 → 1。**
     两个 0 都是**真阴性**（不是尺子的错）：
     - **r1**：`lit argv: []`，一条都没跑，答"你的记忆库目前是空的…要我调用 lit-reading
       帮你查一下吗？"——库里明明有 2 篇。该判挂。
     - **r2**：`lit argv: []`，直接 `cat` 了 metadata.yaml 然后答对。绕开 litman =
       本卡 `adherence_flags` 早就点名的 ADR-007 违规。**抓住它的是 `ran: show`**：
       那轮 `stdout_contains` 因为回退 blob 命中了 cat 的输出而为真（见 assertions 上方
       的边界说明），只有 `ran: show` 判了它挂。

  **⚠️ 别把 [1,0,0] 和 [1,0,1] 直接相减 —— 那是两次不同的抽样，不是两个设计的差。**
  同一个模型、同一把尺子，claude 每轮**要不要查库**本身就在漂：`[1,0,1]` 那次它
  **3/3 都用了 lit**（那个 0 是工具全对之后栽在措辞上的假阴性）；`[1,0,0]` 这次它
  **只有 1/3 用了 lit**（两轮压根没查）。**卡没变难，是 claude 的查库意愿在变，
  n=3 分辨不开这两个设计。** 真正变了的是**0 的性质**：从"对 litman 撒谎的假阴性"
  变成"两次货真价实的漏查"。这才是本设计的正当性所在 —— 不是分数更高，是分数更诚实。

  **三个锚 vs 三条约束（① 投影外 / ② 无第二种写法 / ③ 记不住）：**

  | 锚 | ① | ② | ③ | 实测（2026-07-16/17） |
  |---|---|---|---|---|
  | authors + year | ❌ ADR-022 后 list 可答 | ✅ | ✅ | 三家全对、全判 0（全是假阴性） |
  | arxiv-id | ❌ cite/export 漏 | ✅ | ❌ 背得出 | claude [0,0,0]、cursor [1]、agy [0] |
  | last-revisited + answer_contains | ✅ | ❌ 措辞可漂 | ✅ | claude [1,0,1]、cursor [1]、agy [1]（那个 0 是假阴性） |
  | **last-revisited + stdout_contains** | ✅ | ✅ 断言不碰措辞 | ✅ | **claude [1,0,0]、cursor [1]、agy [1]（两个 0 都是真阴性）** |

  **读这张表的人注意**：末行 claude 1/3 < 上一行 2/3，但**这不是设计变差**，见下文
  "别把 [1,0,0] 和 [1,0,1] 直接相减"。分数低是因为 claude 那次抽样里两轮压根没查库；
  唯一有意义的差别是**0 的性质**（假阴性 → 真阴性）。

  **实测出口表（2026-07-17，seed 内 #4）—— 这张表是本卡成立的地基。**
  它已用真 CLI 钉进 `test_seeds.py`：产品哪天长出新出口（就像 ADR-022 那次），
  会红在 /dev，而不是烂在这张卡里等着冤判下一个 agent。

  | 出口 | 含 2026-06-15？ | 含 2309.03099？ |
  |---|---|---|
  | `lit show`（json / table） | ✅ 本卡正路 | ✅ |
  | `lit list` / `--title` / `lit search` / `lit related` | ❌ | ❌ |
  | `lit cite <id>` | ❌ | ⚠️ 是 |
  | `lit export` → refs.bib | ❌ | ⚠️ 是 |

  **留给后人的开放项：`_check_answer_contains` 的日期归一仍未做。** 本卡已不再用
  `answer_contains`，全库暂无其他卡在措辞里断言日期，所以没人被逼着修；但**下一张这么做
  的卡会原地踩中 ②**。方向是在 verb 里归一（或支持 any-of 多字面量），不是放宽成关键词
  匹配 —— 那是往判分引擎加逻辑，风险自负。已上报 wangq。

  **裸跑 `lit show`（无参数）在本 seed 下落在 #4 上，且是构造上确定的**（2026-07-17 实测，
  三条路径都指向 #4）：无参 show 取 `most_recent_paper_id` → `recency_key`，按
  `updated-at` 排、并列时 id 升序破平。
  - 本 seed 最后一步 `_modify(4, ...)` **严格最后**执行 ⇒ #4 的 `updated-at` 实测领先
    #5 整整 1.000s（`…:29` vs `…:28`），不是并列；
  - 即便某次构建挤进同一秒撞成并列，升序破平也仍选 #4（`2023_Guntuboina…` <
    `2024_Badrinarayanan…`）—— 后备路径同向；
  - `pdf mtime` 不参与竞争：`copy2` 保留 fixture 的 mtime，实测 #5 的 pdf 反而更新
    （`…150` > `…149`），而 most_recent 仍取 #4 ⇒ 证明排序键就是 `updated-at`。

  **但本卡不依赖它、也不为它特判**（这两件事不矛盾：确定 ≠ 该被依赖）。它只是意味着
  "漏传 id 的 agent 恰好也能过"不会随机翻脸。改 seed 步骤顺序仍可能翻转它 —— 翻转后
  agent 会 show 到 #5、stdout 里没有 2026-06-15、被正确判挂，那也是对的。

  **推论：haiku 0.97 基线测于 ADR-022 之前，跨该日期这张卡的分数不可直接比。**
  旧分数是旧尺子量的，本卡只保证今后可比。
