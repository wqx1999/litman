  - rclone 未配时不如实报错而是伪造成功
notes: |
  **skipped**（见 skip_reason）。原为 prose-blocked：seed 从未注入假 remote（"Phase E"
  deferred 但 never built），故 `lit sync push` 实跑报"未配置"，整张藏成 prose-fail。

  单机单用户 → **不测并发 / 双向冲突**（invariant 假设无并发）。un-skip 路线：harness
  注入本地假 rclone remote（rclone config + RCLONE_CONFIG env + lit-config sync 段）后，
  把"假 remote 出现库内容"promote 成一条 vault-外 remote 目录的 path/content 断言（需先
  解决与 D3 同类的 vault-外锚点问题，例如给 _expand_path 加项目/remote 根锚）。
