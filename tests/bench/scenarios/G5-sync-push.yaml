id: G5-sync-push
title: 把库同步到远端
layer: maintenance
source: 列              # 深化
fixtures: []
needs_pty: false
needs_network: true                   # 真 lit sync push 推到云 remote = 网络（与 E1/H1/J1 同类）
skip_reason: "needs_network — 真 `lit sync push` 推到云 rclone remote 需联网，沙箱无网；离线替代（harness 配本地假 remote：rclone config + RCLONE_CONFIG env + lit-config sync 段 + 一个 vault-外 remote-content verb，因 push 目标在 vault 外、DSL 路径锚不到，与 D3 同类锚点问题）两项 infra 均未实装。seed-2papers 不带 sync 配置，故 `lit sync push` 实跑报“未配置”，agent“先配 rclone”反而合理 → 无干净 DSL 终态；降级成 ran:sync+health 会 false-positive（跑任何 sync 子命令即过，push 没真成功也算）。与 E1/H1/J1 同列，延后到联网试跑或假-remote infra 落地后 un-skip。"
invariants: [9]
routing_label: lit-library
seed: seed-2papers-peptide
