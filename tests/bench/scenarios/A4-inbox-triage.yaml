id: A4-inbox-triage
title: 清一下 inbox
layer: curation
source: 缺
fixtures: []
needs_pty: false
invariants: []
routing_label: lit-reading            # inbox triage
seed: seed-5papers-tagged
precondition: |
  库内 3 篇 status=inbox，其中 1 篇 created-at 超过 INBOX_STALE_DAYS。
intent: |
  "帮我清一下 inbox，看看有什么积压的。"
expected_end_state:
  - "ran: list"                        # 应走 lit list --status inbox 之类
  - 输出点出那篇滞留的
auto_fail:
  - 触碰真库
  - 擅自把 inbox 论文改状态 / 删除（triage 是"看+建议"，不是自动处置）
adherence_flags:
  - grep vault 而非 lit list --status inbox
