  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <g transform="translate(32 34.5) scale(0.70) translate(-32 -32)">
    <path d="M32 21 C 24 9 10 9 5 17 C 1.5 23 3.5 40 8 47 C 15 42 26 44 32 52 Z" fill="#ffffff" opacity="0.72" transform="translate(-3 0)"/>
    <path d="M32 21 C 40 9 54 9 59 17 C 62.5 23 60.5 40 56 47 C 49 42 38 44 32 52 Z" fill="#ffffff" transform="translate(4.5 -4) rotate(4 32 36)"/>
