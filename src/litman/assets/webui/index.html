<!doctype html>
<!-- translate="no": a browser translating this page rewrites the text nodes
     React owns, and React blanks the app the next time it tries to update one.
     The meta tag is the same instruction for engines that predate the
     attribute. Needed here, not just in the app window's profile: `lit gui`
     opens a tab in the user's own browser, which we do not configure. -->
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>litman</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // No-FOUC theme init: apply `.dark` before React mounts so the first
      // paint already matches the saved (or system) preference.
      (function () {
        try {
          var t = localStorage.getItem('litman-theme')
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
    <script type="module" crossorigin src="/assets/index-DTaQ0piv.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CRiyAUJJ.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
